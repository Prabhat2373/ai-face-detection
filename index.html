<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Face Detection</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1220;
        --panel: #111a2e;
        --panel-2: #16213a;
        --text: #e8eefc;
        --muted: #94a3b8;
        --line: rgba(148, 163, 184, 0.2);
        --accent: #5eead4;
        --danger: #f87171;
        --warn: #fbbf24;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .shell { max-width: 1440px; margin: 0 auto; padding: 20px; }
      .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 18px; }
      h1 { margin: 0; font-size: 28px; }
      .subtle { color: var(--muted); font-size: 14px; margin-top: 4px; }
      .actions { display: flex; gap: 10px; flex-wrap: wrap; }
      button, input {
        border: 1px solid var(--line);
        background: var(--panel-2);
        color: var(--text);
        padding: 10px 14px;
        border-radius: 8px;
        font: inherit;
      }
      button { cursor: pointer; font-weight: 600; }
      button.primary { background: linear-gradient(135deg, #0f766e, #2563eb); border-color: transparent; }
      .status-row { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
      .panel { background: rgba(17, 26, 46, 0.92); border: 1px solid var(--line); border-radius: 10px; padding: 14px; }
      .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
      .value { font-size: 20px; font-weight: 700; margin-top: 6px; }
      .viewer { position: relative; background: #050b14; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; aspect-ratio: 16 / 9; }
      .viewer img, .viewer canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
      .overlay { pointer-events: none; }
      .lower { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 16px; margin-top: 16px; }
      .faces { display: grid; gap: 10px; }
      .face { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--line); border-radius: 8px; padding: 10px; }
      pre { margin: 0; white-space: pre-wrap; word-break: break-word; font-size: 12px; color: #cbd5e1; }
      .match { display: inline-flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 12px; font-weight: 700; }
      .match-dot { width: 10px; height: 10px; border-radius: 999px; background: var(--warn); box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.16); }
      .match-dot.known { background: #22c55e; box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.16); }
      .register-row { display: grid; grid-template-columns: 1fr auto auto auto; gap: 10px; align-items: center; margin-bottom: 12px; }
      .pill { display: inline-flex; align-items: center; border-radius: 999px; padding: 6px 10px; font-size: 12px; font-weight: 700; }
      .pill.running { background: rgba(34, 197, 94, 0.15); color: #86efac; }
      .pill.error { background: rgba(248, 113, 113, 0.15); color: #fca5a5; }
      .pill.idle { background: rgba(148, 163, 184, 0.15); color: #cbd5e1; }
      .small { font-size: 12px; color: var(--muted); }
      @media (max-width: 960px) {
        .status-row, .lower { grid-template-columns: 1fr; }
        .topbar { flex-direction: column; align-items: flex-start; }
        .register-row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="topbar">
        <div>
          <h1>Live Face Detection</h1>
          <div class="subtle">RTSP feed, backend face matching, and live boxes</div>
        </div>
        <div class="actions">
          <button class="primary" id="startBtn">Start</button>
          <button id="stopBtn">Stop</button>
        </div>
      </div>

      <section class="status-row">
        <div class="panel"><div class="label">State</div><div class="value"><span id="state" class="pill idle">idle</span></div></div>
        <div class="panel"><div class="label">Detections</div><div class="value" id="detections">0</div></div>
        <div class="panel"><div class="label">Frames</div><div class="value" id="frames">0 / 0</div></div>
        <div class="panel"><div class="label">Registered</div><div class="value" id="registeredCount">0</div></div>
        <div class="panel"><div class="label">Last Face</div><div class="value" id="lastFace">-</div></div>
      </section>

      <section class="viewer">
        <img id="stream" alt="Live RTSP stream" />
        <canvas id="overlay" class="overlay"></canvas>
      </section>

      <section class="lower">
        <div class="panel">
          <div class="label">Detected Faces</div>
          <div class="register-row">
            <input id="personName" placeholder="Known face name" />
            <button id="registerBtn">Register face</button>
            <button id="clearBtn">Clear saved</button>
            <div id="recognitionState" class="match">
              <span class="match-dot"></span>
              <span id="recognitionText">Unknown</span>
            </div>
          </div>
          <div class="faces" id="faces">No faces yet</div>
          <div class="small" id="knownCount"></div>
        </div>
        <div class="panel">
          <div class="label">Raw Status</div>
          <pre id="raw"></pre>
        </div>
      </section>
    </main>
    <script src="/app.js" defer></script>
  </body>
  </html>
