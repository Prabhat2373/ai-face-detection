<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" fill="none"
     xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
  <title>Access Logs</title>
  <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
    <!-- Shield body (subtle filled center) -->
    <path d="M12 3.2c3.6 1.6 5.8 2.6 6.2 3.0.6.6 0.9 1.6 0.9 3.8 0 4.6-3.9 7.8-7.1 9.1-.6.2-1.2.2-1.8 0C6 17.8 2 14.6 2 10c0-2.2.3-3.2.9-3.8.4-.4 2.6-1.4 6.1-3.0.6-.25 1.2-.25 1.9 0z"
          fill="currentColor" fill-opacity="0.06" stroke-opacity="0.9" stroke-width="1.1"/>
    <!-- Inner shield outline for detail -->
    <path d="M12 4.1c3.1 1.4 4.9 2.2 5.2 2.4.4.4.6 1.0.6 2.6 0 3.4-2.9 5.8-5.3 6.7-.5.2-1.0.2-1.5 0-2.4-.9-5.3-3.3-5.3-6.7 0-1.6.2-2.2.6-2.6.3-.2 2.1-1.0 5.2-2.4z"
          stroke-opacity="0.16" stroke-width="0.9" fill="none"/>
    <!-- Keyhole/check mark symbol to indicate access -->
    <g transform="translate(8.5,8.5)" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
      <!-- keyhole circle -->
      <circle cx="2.5" cy="1.8" r="0.7" fill="currentColor" fill-opacity="0.9" stroke="none"/>
      <!-- keyhole stem -->
      <path d="M2.5 2.6v1.6" stroke-opacity="0.9"/>
      <!-- small check mark to suggest granted access -->
      <path d="M0.6 5.0l1.1 1.0 2.2-2.4" stroke-opacity="0.95"/>
    </g>

    <!-- subtle outer rounded rectangle to match other sidebar icons -->
    <rect x="1.6" y="1.6" width="20.8" height="20.8" rx="3.2" ry="3.2"
          stroke="currentColor" stroke-opacity="0.06" fill="none" stroke-width="1.2"/>
  </g>
</svg>
